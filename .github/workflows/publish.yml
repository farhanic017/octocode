name: publish
run-name: "release ${{ inputs.bump || inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build
        run: bun run --cwd packages/octocode build
        env:
          OCTOCODE_BUMP: ${{ inputs.bump }}
          OCTOCODE_VERSION: ${{ inputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: packages/octocode/dist/octocode-*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: packages/octocode/dist

      - run: ./script/publish.ts
        env:
          OCTOCODE_VERSION: ${{ inputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
